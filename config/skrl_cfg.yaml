# =============================================================================
# SKRL Configuration — must exactly match the training config
# Training used separate: false (shared trunk, policy_layer + value_layer heads)
# =============================================================================

skrl:
  version: "1.4.3"
  seed: 42

  model:
    policy:
      clip_actions: false
      clip_log_std: true
      min_log_std: -20.0
      max_log_std: 2.0
      initial_log_std: 0.0
      network:
        - name: "net"
          input: "OBSERVATIONS"
          layers: [128, 128]
          activations: "elu"
      output: "ACTIONS"

    value:
      clip_actions: false
      network:
        - name: "net"
          input: "OBSERVATIONS"
          layers: [128, 128]
          activations: "elu"
      output: "ONE"

  agent:
    rollouts: 24
    learning_epochs: 8
    mini_batches: 4
    discount_factor: 0.99
    lambda: 0.95
    learning_rate: 0.003
    random_timesteps: 0
    learning_starts: 0
    grad_norm_clip: 0.5
    ratio_clip: 0.2
    value_clip: 0.2
    clip_predicted_values: true
    entropy_loss_scale: 0.01
    value_loss_scale: 1.0
    kl_threshold: 0.0
    rewards_shaper_scale: 1.0
    time_limit_bootstrap: false